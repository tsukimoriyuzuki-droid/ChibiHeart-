<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChibiHeart</title>

    <!-- PWA: Manifest e Cor do Tema -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">

    <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <!-- Cabeçalho -->
    <header class="main-header">
        <div class="logo">
            <h1>Chibi<span>Heart</span> 💕</h1>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="main-content">

        <!-- VIEW DO PLAYER DE VÍDEO -->
        <section id="player" class="app-view">
            <div class="player-container">
                <!-- Botão Voltar Sobreposto (Redireciona para o Início) -->
                <a href="#inicio" class="btn-voltar-player">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>

                <!-- Elemento do Video.js -->
                <video
                    id="main-player"
                    class="video-js vjs-big-play-centered vjs-theme-chibi"
                    controls
                    preload="auto"
                    playsinline>
                </video>
            </div>
        </section>

        <!-- VIEW DA HOME -->
        <section id="inicio" class="app-view active">

            <!-- HERO BANNER / BANNER DE DESTAQUE (dinâmico via js/hero_banner.js) -->
            <div id="hero-banner" class="hero-banner"></div>

            <template id="modelo-hero-banner">
                <div class="hero-banner-slide">
                    <img class="hero-banner-img" src="" alt="">
                    <div class="hero-banner-overlay"></div>

                    <div class="hero-banner-content">
                        <span class="hero-badge-tag">EM DESTAQUE</span>
                        <h2 class="hero-banner-title"></h2>
                        <p class="hero-banner-desc"></p>

                        <div class="hero-actions">
                            <a class="btn-hero btn-hero-play" role="button" aria-label="Assistir"></a>
                            <a class="btn-hero btn-hero-info" role="button" aria-label="Detalhes"></a>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Grade Vertical (Animes Recomendados) - DINÂMICA -->
            <h2 class="titulo-categoria">Assista no Chibi Heart</h2>
            <div id="grade-recomendados" class="cards-grid"></div>

            <!-- Molde para os cards de animes recomendados -->
            <template id="modelo-card-anime">
                <a href="" class="card poster">
                    <div class="card-media">
                        <img src="" alt="">
                    </div>
                    <h3 class="card-title"></h3>
                </a>
            </template>

        </section>

        <!-- VIEW DE DETALHES -->
        <section id="info" class="app-view">

            <!-- Capa/Banner Superior -->
            <div class="info-hero">
                <a href="#inicio" class="btn-voltar">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <div class="hero-overlay"></div>
                <img id="info-banner" src="" alt="Banner do Anime" class="banner-img">
            </div>

            <!-- Conteúdo Principal dos Detalhes -->
            <div class="info-content">

                <div class="info-header-block">
                    <div class="info-poster">
                        <img id="info-poster-img" src="" alt="Poster do Anime">
                    </div>
                    <div class="info-title-meta">
                        <h2 id="info-titulo">Carregando...</h2>
                        <div class="info-meta">
                            <span id="info-ano" class="info-year">----</span>
                            <span class="info-badge">HD</span>
                            <span id="info-classificacao" class="info-badge font-bold">--</span>
                        </div>
                    </div>
                </div>

                <div id="info-generos" class="info-genres"></div>

                <div class="info-synopsis-container">
                    <h3>Sinopse</h3>
                    <p id="info-sinopse">Carregando sinopse...</p>
                </div>

            </div>

            <!-- Seção de Episódios -->
            <div class="info-episodes-container">
                <h2 class="titulo-categoria">Episódios</h2>
                <div id="lista-episodios" class="episodes-list"></div>

                <template id="modelo-card-ep">
                    <div class="card-ep">
                        <div class="ep-media">
                            <img src="" alt="">
                            <span class="ep-duration"></span>
                        </div>
                        <div class="ep-info">
                            <h3 class="card-title-ep"></h3>
                            <p class="card-subtitle-ep"></p>
                        </div>
                    </div>
                </template>
            </div>

        </section>

        <!-- Outras Seções -->
        <section id="lista" class="app-view">
            <h2>Minha Lista</h2>
            <p>Seus itens salvos aparecem aqui...</p>
        </section>

        <section id="pesquisa" class="app-view">
            <h2>Pesquisar</h2>
            <p>Busque por conteúdos aqui...</p>
        </section>

        <section id="perfil" class="app-view">
            <h2>Meu Perfil</h2>
            <p>Configurações do usuário...</p>
        </section>

    </main>

    <!-- Tab Bar -->
    <nav class="tab-bar">
        <a href="#inicio" class="tab-item active">
            <span class="material-symbols-outlined">home</span>
        </a>
        <a href="#lista" class="tab-item">
            <span class="material-symbols-outlined">list</span>
        </a>
        <a href="#pesquisa" class="tab-item">
            <span class="material-symbols-outlined">search</span>
        </a>
        <a href="#perfil" class="tab-item">
            <span class="material-symbols-outlined">person</span>
        </a>
    </nav>

    <!-- Biblioteca Video.js -->
    <script src="https://vjs.zencdn.net/8.16.1/video.js"></script>

    <!-- Scripts da Aplicação -->
    <script src="js/main.js"></script>
    <script src="js/hero_banner.js"></script>
    <script src="js/player.js"></script>
    <script src="js/animes_recomendados.js"></script>
    <script src="js/info.js"></script>

    <!-- Registro do Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('[SW] Registrado com sucesso! Escopo:', reg.scope))
            .catch((err) => console.error('[SW] Falha ao registrar:', err));
        });
      }
    </script>

</body>
</html>
